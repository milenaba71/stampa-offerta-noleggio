*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(27,42,74,0.1);max-width:520px;width:90%;overflow:hidden}
.hdr{background:#D6246E;padding:24px 28px;display:flex;align-items:center;gap:16px}
.logo{width:48px;height:48px;border-radius:50%;flex-shrink:0}
.hdr h1{color:#fff;font-size:18px;font-weight:700}
.hdr p{color:#ffcce0;font-size:12px;margin-top:2px}
.body{padding:28px}
.info{margin-bottom:20px}.info .label{font-size:11px;color:#6b7b8d;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.info .value{font-size:16px;color:#1B2A4A;font-weight:700}.info .sub{font-size:13px;color:#6b7b8d;margin-top:2px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px}
.stat{background:#f0f4f8;border-radius:8px;padding:12px;text-align:center}
.stat .num{font-size:16px;font-weight:700;color:#1B2A4A}.stat .lbl{font-size:9px;color:#6b7b8d;text-transform:uppercase;margin-top:2px}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#D6246E,#e84393);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-bottom:8px}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(214,36,110,0.35)}
.btn:disabled{opacity:0.5;cursor:wait}
.btn2{background:linear-gradient(135deg,#1B2A4A,#2d4a7a);font-size:13px;padding:11px}
.nodata{text-align:center;padding:30px 20px}.nodata h2{color:#1B2A4A;margin-bottom:8px}
.nodata p{color:#6b7b8d;font-size:13px}.nodata textarea{width:100%;height:180px;margin-top:14px;border:2px solid #d0d8e0;border-radius:8px;padding:10px;font-size:11px;font-family:monospace}
.rp{max-height:200px;overflow-y:auto;margin-bottom:16px;border:1px solid #e5e1da;border-radius:8px}
.rp table{width:100%;border-collapse:collapse;font-size:11px}.rp th{background:#1B2A4A;color:#fff;padding:6px 8px;text-align:left;font-size:10px;position:sticky;top:0}
.rp td{padding:5px 8px;border-bottom:1px solid #f0f0f0}.rp tr:nth-child(even){background:#f8f8f8}
</style>
